# Builds the .3gx plugin binary using devkitARM + 3gxtool.
#
# Usage:
#   docker compose run --rm builder
#   # output: default.3gx

services:
  builder:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        THREEGXTOOL_REPO: ${THREEGXTOOL_REPO:-https://gitlab.com/thepixellizeross/3gxtool}
        THREEGXTOOL_REF: ${THREEGXTOOL_REF:-master}
    working_dir: /work
    volumes:
      - .:/work
    env_file:
      - .env
    command: >-
      sh -lc "make clean all THREEGXTOOL=/usr/local/bin/3gxtool"

