[changelog]
header = ""
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message }} ([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/etsukow/Luma3DS-Plugin-DiscordRPC/commit/{{ commit.id }}))
{%- endfor %}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_parsers = [
  { message = "^feat", group = "🚀 New Features" },
  { message = "^fix", group = "🐛 Bug Fixes" },
  { message = "^refactor", group = "♻️ Refactoring" },
  { message = "^perf", group = "⚡ Performance" },
  { message = "^docs", group = "📚 Documentation" },
  { message = "^ci", group = "🏗️ CI" },
  { message = "^build", group = "🏗️ Build" },
  { message = "^chore", group = "🧹 Chores", skip = true },
  { message = "^revert", group = "⏪ Reverts" },
]
filter_commits = false
tag_pattern = "v[0-9].*"

