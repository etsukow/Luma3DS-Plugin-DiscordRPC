name: Build discord-rpc 3GX

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
  workflow_call:
    secrets:
      DRPC_SERVER_WS_URL:
        required: false
      UDP_PORT:
        required: false

permissions:
  contents: write

env:
  IMAGE_NAME: discord-rpc-builder:ci
  ARTIFACT_PREFIX: discord-rpc

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare CI env file
        run: |
          if [ -n "${{ secrets.DRPC_SERVER_WS_URL }}" ]; then
            printf 'DRPC_SERVER_WS_URL="%s"\nUDP_PORT=%s\n' \
              "${{ secrets.DRPC_SERVER_WS_URL }}" \
              "${UDP_PORT:-5005}" > .env
          elif [ -f .env.example ]; then
            cp .env.example .env
          else
            printf 'DRPC_SERVER_WS_URL="ws://127.0.0.1:8765"\nUDP_PORT=5005\n' > .env
          fi
        env:
          UDP_PORT: ${{ secrets.UDP_PORT }}

      - name: Build Docker image
        run: |
          docker build \
            -f docker/Dockerfile \
            --build-arg THREEGXTOOL_REPO=https://gitlab.com/thepixellizeross/3gxtool \
            --build-arg THREEGXTOOL_REF=master \
            -t "$IMAGE_NAME" .

      - name: Build plugin
        run: |
          docker run --rm \
            --env-file .env \
            -v "$PWD":/work \
            -w /work \
            "$IMAGE_NAME" \
            sh -lc "make clean all THREEGXTOOL=/usr/local/bin/3gxtool"

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          for f in default.3gx default.elf Build/*.map; do
            if [ -f "$f" ]; then
              cp "$f" artifacts/
            fi
          done
          if [ -z "$(ls -A artifacts)" ]; then
            echo "No build artifacts found" >&2
            exit 1
          fi

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_PREFIX }}-${{ github.ref_name }}-${{ github.sha }}
          path: artifacts/*
          if-no-files-found: error
          retention-days: 14

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
