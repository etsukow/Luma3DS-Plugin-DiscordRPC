name: Build discord-rpc 3GX

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  IMAGE_NAME: discord-rpc-builder:ci
  ARTIFACT_PREFIX: discord-rpc

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare CI env file
        run: |
          if [ -n "${{ secrets.IP_PC }}" ] && [ -n "${{ secrets.UDP_PORT }}" ]; then
            printf 'IP_PC="%s"\nUDP_PORT=%s\n' "${{ secrets.IP_PC }}" "${{ secrets.UDP_PORT }}" > .env
          elif [ -f .env.example ]; then
            cp .env.example .env
          elif [ -f .env.exemple ]; then
            cp .env.exemple .env
          else
            printf 'IP_PC="127.0.0.1"\nUDP_PORT=5005\n' > .env
          fi

      - name: Build Docker image
        run: |
          docker build \
            -f docker/Dockerfile \
            --build-arg THREEGXTOOL_REPO=https://gitlab.com/thepixellizeross/3gxtool \
            --build-arg THREEGXTOOL_REF=master \
            -t "$IMAGE_NAME" .

      - name: Build plugin
        run: |
          docker run --rm \
            --env-file .env \
            -v "$PWD":/work \
            -w /work \
            "$IMAGE_NAME" \
            sh -lc "make clean all THREEGXTOOL=/usr/local/bin/3gxtool"

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          for f in default.3gx default.elf Build/*.map; do
            if [ -f "$f" ]; then
              cp "$f" artifacts/
            fi
          done
          if [ -z "$(ls -A artifacts)" ]; then
            echo "No build artifacts found" >&2
            exit 1
          fi

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_PREFIX }}-${{ github.ref_name }}-${{ github.sha }}
          path: artifacts/*
          if-no-files-found: error
          retention-days: 14

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
