name: Build & Release

on:
  push:
    tags:
      - "v*"
    branches:
      - "test*"

permissions:
  contents: write
  packages: write

jobs:
  # ── Create GitHub Release ────────────────────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        if: startsWith(github.ref, 'refs/tags/')
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.cliff.outputs.content }}

  # ── PC client Go (Windows / macOS / Linux) ───────────────────────────────────
  build-client:
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            asset_name: drpc-windows-amd64.exe
          - goos: darwin
            goarch: amd64
            asset_name: drpc-macos-amd64
          - goos: darwin
            goarch: arm64
            asset_name: drpc-macos-arm64
          - goos: linux
            goarch: amd64
            asset_name: drpc-linux-amd64
          - goos: linux
            goarch: arm64
            asset_name: drpc-linux-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: client-go/go.mod

      - name: Build
        working-directory: client-go
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build \
            -ldflags "-X main.Version=${{ github.ref_name }}" \
            -o ../dist/${{ matrix.asset_name }} \
            ./cmd/drpc

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}

  # ── Server Docker image ───────────────────────────────────────────────────────
  build-server-image:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Normalize image namespace
        id: image
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.image.outputs.owner_lc }}/luma3ds-drpc-server
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=test-${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/heads/test') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
